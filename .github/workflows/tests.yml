name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run ROUND_DYNAMIC (Google Sheets) tests
        run: node js/tests.js
      - name: Run chrome extension tests
        run: node chrome-extension/tests.js
