<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dynamic Rounding</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
      padding: 16px;
      color: #202124;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 16px 0;
    }
    .title-row h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    /* iOS-style toggle */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #bdc1c6;
      border-radius: 20px;
      transition: background-color 0.15s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 2px;
      top: 2px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.15s;
    }
    .switch input:checked + .slider {
      background-color: #1a73e8;
    }
    .switch input:checked + .slider::before {
      transform: translateX(16px);
    }
    .section {
      margin-bottom: 20px;
      transition: opacity 0.15s;
    }
    .section.disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5f6368;
      margin-bottom: 8px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
    }
    .toggle-row .toggle-label {
      flex-grow: 1;
      font-size: 13px;
      color: #202124;
    }
    .toggle-row select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      background: #fff;
      color: #5f6368;
      flex-shrink: 0;
    }
    .toggle-row select:disabled {
      opacity: 0.4;
    }
    details.advanced {
      margin-top: 4px;
      transition: opacity 0.15s;
    }
    details.advanced summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5f6368;
      padding: 6px 0;
      user-select: none;
    }
    /* ----- Variant F: linked dual sliders ----- */
    .slider-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 4px;
    }
    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 12px;
      color: #5f6368;
      font-variant-numeric: tabular-nums;
    }
    .label-row .lbl { color: #5f6368; }
    .label-row .lbl.top { color: #1a73e8; }
    .label-row .lbl.bot { color: #b3623d; }
    #sliderBlock.linked .label-row .lbl.bot { color: #9aa0a6; }
    .label-row .val { color: #202124; font-variant-numeric: tabular-nums; }
    .dual-wrap {
      position: relative;
      height: 56px;
    }
    .dual-track {
      position: absolute;
      left: 0; right: 0; top: 26px;
      height: 4px; background: #d6d9de; border-radius: 999px;
    }
    .dual-ticks {
      position: absolute; left: 0; right: 0; top: 20px;
      display: grid; grid-template-columns: repeat(9, 1fr);
      pointer-events: none;
      /* top: 20px centres each 12px tick (top + 6px) on the thumb centre at 26px */
    }
    .dual-ticks .t {
      height: 12px; width: 2px; background: #b5b9c0;
      justify-self: center; border-radius: 1px;
    }
    /* Distinguish the centre tick (offset = 0). */
    .dual-ticks .t:nth-child(5) {
      background: #7a8089;
      height: 14px;
    }
    .dual-thumb {
      position: absolute; top: 26px; transform: translate(-50%, -50%);
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
      cursor: pointer;
      transition: left .12s ease, background .15s, opacity .15s, top .15s ease;
      touch-action: none;
    }
    .dual-thumb.top { background: #1a73e8; z-index: 2; }
    .dual-thumb.bot {
      background: #b3623d; z-index: 1;
      border-radius: 0 0 12px 12px;
      width: 18px; height: 14px;
      top: 42px;
    }
    .dual-thumb.bot.linked { background: #9aa0a6; }
    .dual-thumb:focus-visible { outline: 2px solid #1a73e8; outline-offset: 2px; }
    .section.disabled .dual-thumb { cursor: not-allowed; }
    /* Preview band: 2 samples above slider, 3 below (variant F).
       Grid + display:contents pairs so the "→" column aligns vertically
       and the whole band is centered horizontally under the slider. */
    .results-band {
      display: grid;
      grid-template-columns: auto auto auto auto;
      justify-content: center;
      column-gap: 6px;
      row-gap: 2px;
      align-items: baseline;
      font-size: 12px;
      color: #3c4043;
      font-variant-numeric: tabular-nums;
      padding: 2px 0;
    }
    .results-band .pair { display: contents; }
    .results-band .from {
      color: #5f6368;
      text-align: right;
      white-space: normal;
    }
    .results-band .arrow { color: #5f6368; text-align: center; }
    .results-band .num { color: #202124; text-align: right; }
    .results-band .step { color: #5f6368; text-align: left; }
    .results-band .empty {
      color: #80868b;
      font-style: italic;
      text-align: center;
    }
    #rangeExpr {
      width: 100%;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 13px;
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
    }
    #rangeExpr.invalid {
      border-color: #d93025;
      background: #fce8e6;
    }
    .range-help {
      font-size: 11px;
      color: #5f6368;
      margin-top: 4px;
      line-height: 1.5;
    }
    .range-help code {
      background: #f1f3f4;
      padding: 0 4px;
      border-radius: 3px;
    }
    .status {
      font-size: 12px;
      color: #5f6368;
      margin-top: 12px;
      min-height: 1em;
    }
    .divider {
      border: none;
      border-top: 1px solid #e8eaed;
      margin: 4px 0;
    }
    @keyframes drSidebarFlash {
      0%   { box-shadow: inset 0 0 0 2px rgba(66, 133, 244, 0.0); }
      25%  { box-shadow: inset 0 0 0 2px rgba(66, 133, 244, 0.45); }
      50%  { box-shadow: inset 0 0 0 2px rgba(66, 133, 244, 0.0); }
      75%  { box-shadow: inset 0 0 0 2px rgba(66, 133, 244, 0.45); }
      100% { box-shadow: inset 0 0 0 2px rgba(66, 133, 244, 0.0); }
    }
    .dr-sidebar-flash {
      animation: drSidebarFlash 0.6s ease-in-out;
    }
  </style>
</head>
<body>
  <div class="title-row">
    <h1>Dynamic Rounding</h1>
    <label class="switch">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>

  <div class="section" id="optionsSection">
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="simplifyMixedCells">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">words</span>
    </div>
    <hr class="divider">
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="simplifyMixedCurrency">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">currencies</span>
    </div>
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="simplifyMixedPercent">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">percentages</span>
    </div>
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="simplifyDates">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">dates</span>
      <select id="dateGranularity" disabled>
        <option value="year">year</option>
        <option value="decade">decade</option>
        <option value="century">century</option>
      </select>
    </div>
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="simplifyTimes">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">times</span>
      <select id="timeGranularity" disabled>
        <option value="hour">hour</option>
        <option value="minute">minute</option>
      </select>
    </div>
    <hr class="divider">
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="simplifyFirstRow">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">first row</span>
    </div>
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="simplifyFirstColumn">
        <span class="slider"></span>
      </label>
      <span class="toggle-label">first column</span>
    </div>
  </div>

  <div class="section" id="rangeSection" hidden>
    <div class="section-title">Range</div>
    <input type="text" id="rangeExpr" placeholder="(blank = whole table)" autocomplete="off">
    <div class="range-help">
      <code>A</code>, <code>A:D</code>, <code>1:10</code>, <code>B2:E8</code>,
      or <code>{A1:E8, G3:G}</code>
    </div>
  </div>

  <details class="advanced section" id="advancedSection">
    <summary>Advanced</summary>
    <div class="slider-block" id="sliderBlock">
      <div class="label-row">
        <span class="lbl top" id="topLabel">largest numbers: −0.5</span>
      </div>
      <div class="results-band" id="topBand"></div>
      <div class="dual-wrap" id="dualWrap">
        <div class="dual-track"></div>
        <div class="dual-ticks" aria-hidden="true">
          <span class="t"></span><span class="t"></span><span class="t"></span>
          <span class="t"></span><span class="t"></span><span class="t"></span>
          <span class="t"></span><span class="t"></span><span class="t"></span>
        </div>
        <div class="dual-thumb bot linked" id="botThumb" tabindex="0" role="slider"
             aria-label="all other numbers offset" aria-valuemin="-1" aria-valuemax="1" aria-valuenow="-0.5"></div>
        <div class="dual-thumb top" id="topThumb" tabindex="0" role="slider"
             aria-label="largest numbers offset" aria-valuemin="-1" aria-valuemax="1" aria-valuenow="-0.5"></div>
      </div>
      <div class="label-row">
        <span class="lbl bot" id="botLabel">all other numbers: −0.5</span>
      </div>
      <div class="results-band" id="botBand"></div>
    </div>
  </details>

  <div class="status" id="status"></div>

  <script src="defaults.js"></script>
  <script src="rounding.js"></script>
  <script src="core.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
