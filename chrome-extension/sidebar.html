<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dynamic Rounding</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
      padding: 16px;
      color: #202124;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 16px 0;
    }
    .section {
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5f6368;
      margin-bottom: 8px;
    }
    label.checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      cursor: pointer;
    }
    label.checkbox-row input {
      margin: 0;
    }
    .status {
      font-size: 12px;
      color: #5f6368;
      margin-top: 12px;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <h1>Dynamic Rounding</h1>

  <div class="section">
    <div class="section-title">Exclude cells that also contain</div>
    <label class="checkbox-row">
      <input type="checkbox" id="excludeWords" checked>
      <span>words</span>
    </label>
  </div>

  <div class="status" id="status"></div>

  <script src="sidebar.js"></script>
</body>
</html>
