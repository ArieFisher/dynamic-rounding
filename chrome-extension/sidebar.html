<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dynamic Rounding</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
      padding: 16px;
      color: #202124;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 16px 0;
    }
    .title-row h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    /* iOS-style toggle */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #bdc1c6;
      border-radius: 20px;
      transition: background-color 0.15s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 2px;
      top: 2px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.15s;
    }
    .switch input:checked + .slider {
      background-color: #1a73e8;
    }
    .switch input:checked + .slider::before {
      transform: translateX(16px);
    }
    .section {
      margin-bottom: 20px;
      transition: opacity 0.15s;
    }
    .section.disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5f6368;
      margin-bottom: 8px;
    }
    .section-heading {
      font-size: 12px;
      font-weight: 500;
      color: #3c4043;
      margin: 0 0 4px 0;
    }
    label.checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      cursor: pointer;
    }
    label.checkbox-row input[type="checkbox"] {
      margin: 0;
    }
    label.checkbox-row .row-label {
      flex-grow: 1;
    }
    label.checkbox-row select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      background: #fff;
      color: #5f6368;
    }
    label.checkbox-row select:disabled {
      opacity: 0.4;
    }
    .granularity-label {
      font-size: 11px;
      color: #5f6368;
      margin-right: 4px;
    }
    .exclusion-group {
      margin-bottom: 12px;
    }
    details.advanced {
      margin-top: 4px;
      transition: opacity 0.15s;
    }
    details.advanced summary {
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5f6368;
      padding: 6px 0;
      user-select: none;
    }
    .param-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .param-row .param-label {
      flex-grow: 1;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
      color: #3c4043;
    }
    .param-row input[type="number"] {
      width: 64px;
      font-size: 12px;
      padding: 3px 6px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      text-align: right;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .param-row input::placeholder {
      color: #9aa0a6;
    }
    .param-help {
      font-size: 11px;
      color: #5f6368;
      margin-top: 4px;
      line-height: 1.4;
    }
    #rangeExpr {
      width: 100%;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 13px;
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
    }
    #rangeExpr.invalid {
      border-color: #d93025;
      background: #fce8e6;
    }
    .range-help {
      font-size: 11px;
      color: #5f6368;
      margin-top: 4px;
      line-height: 1.5;
    }
    .range-help code {
      background: #f1f3f4;
      padding: 0 4px;
      border-radius: 3px;
    }
    .status {
      font-size: 12px;
      color: #5f6368;
      margin-top: 12px;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <div class="title-row">
    <h1>Dynamic Rounding</h1>
    <label class="switch">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="section" id="optionsSection">
    <div class="exclusion-group">
      <p class="section-heading"><em>Include</em> numbers in cells containing:</p>
      <label class="checkbox-row">
        <input type="checkbox" id="includeWords" checked>
        <span>words</span>
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="includeCurrency" checked>
        <span>currencies</span>
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="includePercent" checked>
        <span>percentages</span>
      </label>
    </div>

    <div class="exclusion-group">
      <p class="section-heading">Exclude:</p>
      <label class="checkbox-row">
        <input type="checkbox" id="excludeFirstRow">
        <span>first row</span>
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="excludeFirstColumn" checked>
        <span>first column</span>
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="excludeDates" checked>
        <span class="row-label">dates</span>
        <span class="granularity-label">round to:</span>
        <select id="dateGranularity" disabled>
          <option value="year">year</option>
          <option value="decade" selected>decade</option>
          <option value="century">century</option>
        </select>
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="excludeTimes" checked>
        <span class="row-label">times</span>
        <span class="granularity-label">round to:</span>
        <select id="timeGranularity" disabled>
          <option value="minute" selected>minute</option>
          <option value="hour">hour</option>
        </select>
      </label>
    </div>
  </div>

  <div class="section" id="rangeSection" hidden>
    <div class="section-title">Range</div>
    <input type="text" id="rangeExpr" placeholder="(blank = whole table)" autocomplete="off">
    <div class="range-help">
      <code>A</code>, <code>A:D</code>, <code>1:10</code>, <code>B2:E8</code>,
      or <code>{A1:E8, G3:G}</code>
    </div>
  </div>

  <details class="advanced section" id="advancedSection">
    <summary>Advanced</summary>
    <div class="param-row">
      <span class="param-label">offset_top</span>
      <input type="number" id="offsetTop" step="0.1" placeholder="-0.5">
    </div>
    <div class="param-row">
      <span class="param-label">offset_other</span>
      <input type="number" id="offsetOther" step="0.1" placeholder="-0.5">
    </div>
    <div class="param-row">
      <span class="param-label">num_top</span>
      <input type="number" id="numTop" step="1" min="1" placeholder="1">
    </div>
    <div class="param-help">
      Maps to the <code>ROUND_DYNAMIC</code> Google Sheets function.
      Leave blank for defaults. <code>offset_other</code> inherits from
      <code>offset_top</code> when blank.
    </div>
  </details>

  <div class="status" id="status"></div>

  <script src="sidebar.js"></script>
</body>
</html>
