<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dynamic Rounding</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
      padding: 16px;
      color: #202124;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 16px 0;
    }
    .master-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0 16px;
      border-bottom: 1px solid #e8eaed;
      margin-bottom: 16px;
    }
    .master-row .label {
      font-weight: 500;
    }
    /* iOS-style toggle */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #bdc1c6;
      border-radius: 20px;
      transition: background-color 0.15s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 2px;
      top: 2px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.15s;
    }
    .switch input:checked + .slider {
      background-color: #1a73e8;
    }
    .switch input:checked + .slider::before {
      transform: translateX(16px);
    }
    .section {
      margin-bottom: 20px;
      transition: opacity 0.15s;
    }
    .section.disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5f6368;
      margin-bottom: 8px;
    }
    label.checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      cursor: pointer;
    }
    label.checkbox-row input[type="checkbox"] {
      margin: 0;
    }
    label.checkbox-row .row-label {
      flex-grow: 1;
    }
    label.checkbox-row select {
      font-size: 12px;
      padding: 2px 4px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      background: #fff;
      color: #5f6368;
    }
    label.checkbox-row select:disabled {
      opacity: 0.4;
    }
    .granularity-label {
      font-size: 11px;
      color: #5f6368;
      margin-right: 4px;
    }
    .status {
      font-size: 12px;
      color: #5f6368;
      margin-top: 12px;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <h1>Dynamic Rounding</h1>

  <div class="master-row">
    <span class="label">Apply dynamic rounding</span>
    <label class="switch">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="section" id="optionsSection">
    <div class="section-title">Exclude cells also containing:</div>
    <label class="checkbox-row">
      <input type="checkbox" id="excludeWords" checked>
      <span>words</span>
    </label>
    <label class="checkbox-row">
      <input type="checkbox" id="excludeDates" checked>
      <span class="row-label">dates</span>
      <span class="granularity-label">round to:</span>
      <select id="dateGranularity" disabled>
        <option value="year" selected>year</option>
        <option value="decade">decade</option>
        <option value="century">century</option>
      </select>
    </label>
    <label class="checkbox-row">
      <input type="checkbox" id="excludeTimes" checked>
      <span class="row-label">times</span>
      <span class="granularity-label">round to:</span>
      <select id="timeGranularity" disabled>
        <option value="minute" selected>minute</option>
        <option value="hour">hour</option>
      </select>
    </label>
    <label class="checkbox-row">
      <input type="checkbox" id="excludeFirstColumn" checked>
      <span>first column</span>
    </label>
    <label class="checkbox-row">
      <input type="checkbox" id="excludePercent">
      <span>percentages</span>
    </label>
    <label class="checkbox-row">
      <input type="checkbox" id="excludeCurrency">
      <span>currencies</span>
    </label>
  </div>

  <div class="status" id="status"></div>

  <script src="sidebar.js"></script>
</body>
</html>
